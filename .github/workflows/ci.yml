name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - '**/*.go'
      - 'makefile'
      - 'go.mod'
      - 'go.sum'
      - '!**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-verify:
    uses: Open-CMSIS-Pack/workflows-and-actions-collection/.github/workflows/build-and-verify.yml@v1.0.2
    secrets:
      QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}
    with:
      program: cbuild2cmake
      go-version-file: ./go.mod
      enable-qlty-coverage: true

  publish-test-results:
    name: "Publish Tests Results"
    needs: [ build-and-verify ]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.workflow != 'Release' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Download Artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts

      - name: publish test results
        uses: EnricoMi/publish-unit-test-result-action/linux@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: artifacts/**/cbuild2cmake-testreport-*.xml
          report_individual_runs: true
