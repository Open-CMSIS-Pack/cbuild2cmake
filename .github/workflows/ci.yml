name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - '**/*.go'
      - 'makefile'
      - 'go.mod'
      - 'go.sum'
      - '!**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-verify:
    uses: Open-CMSIS-Pack/workflows-and-actions-collection/.github/workflows/build-and-verify.yml@v1.0.3
    secrets:
      QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}
    with:
      program: cbuild2cmake
      go-version-file: ./go.mod
      enable-qlty-coverage: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}

  publish-test-results:
    name: "Publish Tests Results"
    needs: [ build-and-verify ]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.workflow != 'Release' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: publish test results
        uses: EnricoMi/publish-unit-test-result-action/linux@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: artifacts/**/cbuild2cmake-testreport-*.xml
          report_individual_runs: true
